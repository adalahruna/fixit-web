<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Fixit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style data-purpose="typography">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <!-- BEGIN: MainContainer -->
    <main
        class="w-full max-w-6xl bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">
        <!-- BEGIN: LeftPanel (Branding & Hero) -->
        <section
            class="w-full md:w-1/2 bg-[#0a58fa] p-10 md:p-14 flex flex-col justify-between text-white rounded-l-[2rem] rounded-r-none md:rounded-r-none md:rounded-l-[2rem]">
            <!-- Logo Header -->
            <header class="flex items-center gap-3 mb-10">
                <svg class="lucide lucide-bike" fill="none" height="24" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"
                    xmlns="http://www.w3.org/2000/svg">
                    <circle cx="5.5" cy="17.5" r="3.5"></circle>
                    <circle cx="18.5" cy="17.5" r="3.5"></circle>
                    <path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm-3 11.5V14l-3-3 4-3 2 3h2"></path>
                </svg>
                <span class="text-2xl font-bold tracking-wide">Fixit</span>
            </header>
            <!-- Hero Image -->
            <div class="relative w-full aspect-video md:aspect-[4/3] rounded-xl overflow-hidden mb-10 shadow-lg">
                <img alt="Motorcycle Dashboard" class="object-cover w-full h-full object-center absolute inset-0"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWVKWtY8JM-kJACjJg8LgKbAb0emT3fQXnqQ7LAI2RXAXKLXtu-peznkPZ420ih-tJBXuuNg-UT3re4d3XHoH45GQs-nFc1BXwMfA9q1wLv8H17zxSuW-OEngWH3cm16tiQv9YRUzT7DnBa4b-YYja570xcGhWxqxodGy3rwlqfLAgynzxTdydacn2kR_Yf-3KdQRtXm8IfDykIiymdEM7UeRLRBzdWmx6FhsdRYhUeBMGryepjaimvQ0ZeBV0qPhlvtehJ7M0iuOG"
                    style="object-position: center 30%;" />
            </div>
            <!-- Value Proposition -->
            <div class="space-y-4">
                <h1 class="text-3xl md:text-4xl font-bold leading-tight">
                    Solusi Cerdas Perawatan Motor Anda
                </h1>
                <p class="text-blue-100/90 text-sm md:text-base leading-relaxed max-w-md">
                    Kelola jadwal servis, riwayat pemeliharaan, dan konsultasi mekanik dalam satu aplikasi praktis.
                </p>
            </div>
        </section>
        <!-- END: LeftPanel -->
        <!-- BEGIN: RightPanel (Login Form) -->
        <section class="w-full md:w-1/2 p-10 md:p-16 flex flex-col justify-center bg-white rounded-r-[2rem]">
            <div class="max-w-md mx-auto w-full">
                <!-- Form Header -->
                <header class="mb-10">
                    <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Selamat Datang Kembali</h2>
                    <p class="text-gray-500 text-sm font-medium">Masuk untuk mengelola perawatan motor Anda</p>
                </header>
                <!-- Login Form -->
                <form action="#" class="space-y-6" method="POST">
                    <!-- Email Input -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2" for="email">Email atau Nomor
                            Telepon</label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-regular fa-envelope"></i>
                            </div>
                            <input
                                class="pl-11 block w-full rounded-xl border-gray-200 bg-gray-50/50 py-3.5 text-gray-900 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm transition-colors border outline-none"
                                id="email" name="email" placeholder="Masukkan email atau nomor telepon" type="text" />
                        </div>
                    </div>
                    <!-- Password Input -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Password</label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-lock text-sm"></i>
                            </div>
                            <input
                                class="pl-11 pr-11 block w-full rounded-xl border-gray-200 bg-gray-50/50 py-3.5 text-gray-900 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm transition-colors border outline-none"
                                id="password" name="password" placeholder="Masukkan password" type="password" />
                            <div
                                class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-gray-400 hover:text-gray-600 transition-colors">
                                <i class="fa-regular fa-eye"></i>
                            </div>
                        </div>
                    </div>
                    <!-- Forgot Password Link -->
                    <div class="flex items-center justify-start">
                        <a class="text-sm font-bold text-[#0a58fa] hover:text-blue-700 transition-colors" href="#">
                            Lupa Password?
                        </a>
                    </div>
                    <!-- Submit Button -->
                    <div>
                        <button
                            class="w-full flex justify-center items-center gap-2 rounded-xl bg-[#0a58fa] px-4 py-4 text-sm font-bold text-white shadow-[0_8px_20px_rgba(10,88,250,0.3)] hover:bg-blue-700 hover:shadow-[0_4px_12px_rgba(10,88,250,0.2)] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-all active:scale-[0.98]"
                            type="submit">
                            Masuk Sekarang
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
                <!-- Register Link -->
                <p class="mt-8 text-center text-sm text-gray-600 font-medium">
                    Belum punya akun?
                    <a class="font-bold text-[#0a58fa] hover:text-blue-700 transition-colors ml-1" href="#">Daftar</a>
                </p>
            </div>
        </section>
        <!-- END: RightPanel -->
    </main>
    <!-- END: MainContainer -->
</body>

</html>
